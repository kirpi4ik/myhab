# This workflow will build a Java project with Gradle
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-gradle

name: Java CI with Gradle

on:
  push:
    branches: [ master, beta ]
  pull_request:
    branches: [ master, beta ]

env:
  QENV: production

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3.12.0
        with:
          version: latest
      - name: Builder instance name
        run: echo ${{ steps.buildx.outputs.name }}
      - name: Available platforms
        run: echo ${{ steps.buildx.outputs.platforms }}
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Setup node
        uses: actions/setup-node@v6.2.0
        with:
          node-version: 18
          check-latest: false
          cache: 'yarn'
          cache-dependency-path: client/web-vue3/yarn.lock
      - run: yarn install --immutable --immutable-cache --check-cache
      - name: Set up JDK 17
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'temurin'
          java-version: 17
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Cache Gradle packages
        uses: actions/cache@v5.0.3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: ${{ runner.os }}-gradle
      - name: Build with Gradle
        env:
          NEXUS_DEVEXPERT_EU_PASSWORD: ${{ secrets.NEXUS_DEVEXPERT_EU_PASSWORD }}
        run: ./gradlew clean copyClientResources assembleServerAndClient createDockerfile
      - name: Login to DockerHub
        uses: docker/login-action@v3.7.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Get version
        id: get_version
        run: |
          VERSION=$(grep -m1 '^projectVersion=' gradle.properties | cut -d= -f2 | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/master" ]; then
            echo "dockertag=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "dockertag=$VERSION-${GITHUB_SHA::6}" >> $GITHUB_OUTPUT
          fi
      - name: Build docker and push
        uses: docker/build-push-action@v6.19.2
        with:
          context: build/docker
          file: build/docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: kirpi4ik/myhab:${{steps.get_version.outputs.dockertag}}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache
      - name: Build docker and push latest
        uses: docker/build-push-action@v6.19.2
        with:
          context: build/docker
          file: build/docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: kirpi4ik/myhab:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache
      - name: Create GitHub tag & release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.get_version.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
          else
            gh release create "$TAG" \
              --target "${GITHUB_SHA}" \
              --title "$TAG" \
              --generate-notes
          fi
      - name: Bump dev version via auto-approved PR
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          ./gradlew bumpVersion
          ./gradlew syncVersions
          NEXT=$(grep -m1 '^projectVersion=' gradle.properties | cut -d= -f2 | tr -d '[:space:]')
          BRANCH="chore/bump-${NEXT}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add gradle.properties client/web-vue3/package.json client/web-vue3/.env client/web-vue3/.env.prod
          git commit -m "chore: bump dev version to ${NEXT} [skip ci]"
          # Push the bump to its own (unprotected) branch with GITHUB_TOKEN. -f makes a
          # re-run of the same version overwrite a leftover branch from a failed attempt.
          git push -f origin "$BRANCH"
          # Open the bump PR as github-actions[bot] (GITHUB_TOKEN). Reuse an existing PR on re-run.
          PR_URL=$(gh pr create --base master --head "$BRANCH" \
            --title "chore: bump dev version to ${NEXT}" \
            --body "Automated post-release version bump. Squash-merged with [skip ci] so it does not retrigger CI." \
            2>/dev/null || gh pr view "$BRANCH" --json url --jq .url)
          # Approve as the repo owner via the PAT — a different identity than the bot author,
          # which satisfies the required 1 review. RELEASE_PAT needs Pull requests: write.
          GH_TOKEN="${RELEASE_PAT}" gh pr review "$PR_URL" --approve
          # Squash-merge; [skip ci] in the squash subject stops the master push from looping.
          for attempt in 1 2 3 4 5 6; do
            if GH_TOKEN="${RELEASE_PAT}" gh pr merge "$PR_URL" --squash --delete-branch \
                 --subject "chore: bump dev version to ${NEXT} [skip ci]"; then
              echo "Merged ${PR_URL}"; break
            fi
            echo "Merge not ready (attempt ${attempt}); waiting for mergeability..."; sleep 5
          done